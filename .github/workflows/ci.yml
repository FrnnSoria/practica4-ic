name: Java CI con Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compilar proyecto con Maven
      run: mvn clean compile

    - name: Ejecutar pruebas unitarias (JUnit)
      run: mvn test

    - name: Analisis estatico de calidad (Checkstyle)
      run: mvn checkstyle:check